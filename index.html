<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>VisionScan RT — YOLOv8n</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --g:   #00ff88;
      --gdm: #a8f0c6;
      --gdk: #0a2e1e;
      --gmd: #155a38;
      --bg:  #04080b;
      --yel: #ffcc00;
      --red: #ff3355;
    }
    html, body { height: 100%; background: var(--bg); overflow-x: hidden; }
    body { font-family: 'Share Tech Mono', monospace; color: var(--gdm); }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent 0px, transparent 2px,
        rgba(0,255,120,.012) 2px, rgba(0,255,120,.012) 4px);
      pointer-events: none; z-index: 9999;
    }

    .app {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 12px 28px;
    }

    /* ── Header ── */
    header {
      width: 100%; max-width: 560px;
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 10px 0 14px;
    }
    .logo-row { display: flex; align-items: center; gap: 11px; }
    .logo-ring {
      width: 28px; height: 28px;
      border: 2px solid var(--g); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,255,136,.5); }
      50%      { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
    }
    .logo-dot { width: 8px; height: 8px; background: var(--g); border-radius: 50%; }
    h1 { font-family:'Exo 2',sans-serif; font-weight:800; font-size:1.3rem; letter-spacing:.18em; color:#fff; text-transform:uppercase; }
    .sub { font-size:.55rem; color:var(--gmd); letter-spacing:.25em; text-transform:uppercase; }

    /* ── Stats ── */
    .stats {
      width:100%; max-width:560px;
      display:grid; grid-template-columns:repeat(4,1fr);
      border:1px solid var(--gdk); border-bottom:none;
      background:rgba(0,255,136,.015);
    }
    .stat { padding:7px 8px; border-right:1px solid var(--gdk); display:flex; flex-direction:column; gap:2px; }
    .stat:last-child { border-right:none; }
    .stat-lbl { font-size:.45rem; color:var(--gmd); letter-spacing:.2em; text-transform:uppercase; }
    .stat-val { font-size:.8rem; color:var(--g); }
    #sObjs { color:var(--yel); }
    #sBackend { font-size:.65rem; }

    /* ── Camera ── */
    .cam-wrap {
      width:100%; max-width:560px;
      position:relative; background:#000;
      border:1px solid var(--gdk); overflow:hidden;
    }
    video { width:100%; display:block; aspect-ratio:4/3; object-fit:cover; }
    #overlay {
      position:absolute; inset:0; width:100%; height:100%;
      pointer-events:none; z-index:5;
    }

    /* corner brackets */
    .c { position:absolute; width:20px; height:20px; z-index:8; }
    .c-tl { top:6px; left:6px;   border-top:2px solid var(--g); border-left:2px solid var(--g); }
    .c-tr { top:6px; right:6px;  border-top:2px solid var(--g); border-right:2px solid var(--g); }
    .c-bl { bottom:6px; left:6px;  border-bottom:2px solid var(--g); border-left:2px solid var(--g); }
    .c-br { bottom:6px; right:6px; border-bottom:2px solid var(--g); border-right:2px solid var(--g); }

    .fps-badge {
      position:absolute; top:10px; right:10px;
      font-size:.58rem; color:var(--g);
      background:rgba(0,0,0,.75); border:1px solid var(--gdk);
      padding:3px 8px; z-index:9; letter-spacing:.1em;
    }

    /* loading overlay */
    .ov {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      background:rgba(4,8,11,.93); z-index:20;
    }
    .ov.gone { display:none; }
    .spinner {
      width:44px; height:44px;
      border:2px solid var(--gdk); border-top-color:var(--g);
      border-radius:50%; animation:spin .75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .ov-title { font-size:.72rem; color:var(--g); letter-spacing:.18em; }
    .ov-sub   { font-size:.58rem; color:var(--gmd); letter-spacing:.1em; text-align:center; padding:0 20px; }
    .prog { width:160px; height:2px; background:var(--gdk); overflow:hidden; }
    .prog-fill {
      height:100%; background:var(--g); width:30%;
      animation:pg 1.4s ease-in-out infinite;
    }
    @keyframes pg {
      0%   { margin-left:0%;   width:30%; }
      50%  { margin-left:40%;  width:40%; }
      100% { margin-left:100%; width:0%;  }
    }

    /* ── Controls ── */
    .controls { width:100%; max-width:560px; display:flex; gap:10px; padding:12px 0; }
    .btn {
      flex:1; padding:12px 8px;
      border:1px solid var(--gdk); background:transparent;
      color:var(--gdm); font-family:'Share Tech Mono',monospace;
      font-size:.7rem; letter-spacing:.15em; text-transform:uppercase;
      cursor:pointer; transition:all .15s;
    }
    .btn:hover:not(:disabled) { border-color:var(--g); color:var(--g); background:rgba(0,255,136,.05); }
    .btn:disabled { opacity:.3; cursor:not-allowed; }
    .btn-go   { border-color:var(--g); background:var(--g); color:var(--bg); font-weight:700; }
    .btn-go:hover:not(:disabled) { background:#33ffaa; border-color:#33ffaa; }
    .btn-red:hover:not(:disabled) { border-color:var(--red); color:var(--red); background:rgba(255,51,85,.05); }

    /* ── Detected panel ── */
    .panel {
      width:100%; max-width:560px;
      border:1px solid var(--gdk); border-top:none;
      background:rgba(0,255,136,.015);
      padding:12px 14px; min-height:58px;
    }
    .panel-hdr {
      font-size:.52rem; color:var(--gmd); letter-spacing:.25em;
      text-transform:uppercase; margin-bottom:10px;
      display:flex; align-items:center; gap:8px;
    }
    .panel-hdr::after { content:''; flex:1; height:1px; background:var(--gdk); }

    .chips { display:flex; flex-wrap:wrap; gap:7px; }
    .chip {
      display:flex; align-items:center; gap:5px;
      padding:4px 9px;
      border:1px solid var(--gdk); font-size:.7rem; color:var(--gdm);
      opacity:0; transform:translateY(4px);
      animation:chipIn .3s ease forwards;
    }
    @keyframes chipIn { to { opacity:1; transform:none; } }
    .chip.hi { border-color:var(--g); color:var(--g); }
    .chip-sc { font-size:.58rem; }
    .chip.hi .chip-sc { color:var(--g); }
    .chip:not(.hi) .chip-sc { color:var(--gmd); }

    .no-obj { font-size:.67rem; color:var(--gmd); letter-spacing:.1em; }

    /* model info footer */
    .footer {
      width:100%; max-width:560px;
      font-size:.5rem; color:var(--gdk);
      letter-spacing:.12em; text-align:center; padding:12px 0 4px;
    }

    @keyframes tag-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-row">
      <div class="logo-ring"><div class="logo-dot"></div></div>
      <h1>VisionScan RT</h1>
    </div>
    <div class="sub">YOLOv8n · On-Device · No Cloud · 80 classi</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-lbl">Stato</div><div class="stat-val" id="sStatus">OFFLINE</div></div>
    <div class="stat"><div class="stat-lbl">Oggetti</div><div class="stat-val" id="sObjs">—</div></div>
    <div class="stat"><div class="stat-lbl">FPS</div><div class="stat-val" id="sFps">—</div></div>
    <div class="stat"><div class="stat-lbl">Backend</div><div class="stat-val" id="sBackend">—</div></div>
  </div>

  <div class="cam-wrap">
    <div class="c c-tl"></div><div class="c c-tr"></div>
    <div class="c c-bl"></div><div class="c c-br"></div>
    <div class="fps-badge" id="fpsBadge">-- FPS</div>

    <div class="ov" id="ov">
      <div class="spinner" id="ovSpinner"></div>
      <div class="ov-title" id="ovTitle">INIZIALIZZAZIONE</div>
      <div class="prog" id="ovProg"><div class="prog-fill"></div></div>
      <div class="ov-sub" id="ovSub">Premi AVVIA — il modello si carica una sola volta</div>
    </div>

    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="controls">
    <button class="btn btn-go"  id="btnStart">▶ Avvia</button>
    <button class="btn"         id="btnPause" style="display:none">⏸ Pausa</button>
    <button class="btn btn-red" id="btnStop"  style="display:none">■ Stop</button>
  </div>

  <div class="panel">
    <div class="panel-hdr">Oggetti rilevati</div>
    <div class="chips" id="chips"><div class="no-obj">Nessun oggetto rilevato</div></div>
  </div>

  <div class="footer">YOLOv8n · ONNX q8 · ~6 MB · Transformers.js · WebGPU / WASM</div>
</div>

<script type="module">
// ── Import Transformers.js v3 (ESM, from jsDelivr CDN) ──────────────────────
import {
  pipeline,
  env,
  RawImage
} from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js';

// Allow remote model download from HuggingFace Hub
env.allowLocalModels = false;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const video    = document.getElementById('video');
const overlay  = document.getElementById('overlay');
const ctx      = overlay.getContext('2d');
const btnStart = document.getElementById('btnStart');
const btnPause = document.getElementById('btnPause');
const btnStop  = document.getElementById('btnStop');
const ov       = document.getElementById('ov');
const ovTitle  = document.getElementById('ovTitle');
const ovSub    = document.getElementById('ovSub');
const ovProg   = document.getElementById('ovProg');
const fpsBadge = document.getElementById('fpsBadge');
const sStatus  = document.getElementById('sStatus');
const sObjs    = document.getElementById('sObjs');
const sFps     = document.getElementById('sFps');
const sBackend = document.getElementById('sBackend');
const chipsEl  = document.getElementById('chips');

// ── State ─────────────────────────────────────────────────────────────────────
let detector = null;
let stream   = null;
let running  = false;
let paused   = false;
let lastTime = 0;
let fps      = 0;
const CONF   = 0.40; // minimum confidence threshold

// ── Italian label map (COCO 80 classes) ───────────────────────────────────────
const IT = {
  person:'persona', bicycle:'bicicletta', car:'automobile', motorcycle:'moto',
  airplane:'aereo', bus:'autobus', train:'treno', truck:'camion', boat:'barca',
  'traffic light':'semaforo', 'fire hydrant':'idrante', 'stop sign':'stop',
  'parking meter':'parchimetro', bench:'panchina', bird:'uccello', cat:'gatto',
  dog:'cane', horse:'cavallo', sheep:'pecora', cow:'mucca', elephant:'elefante',
  bear:'orso', zebra:'zebra', giraffe:'giraffa', backpack:'zaino', umbrella:'ombrello',
  handbag:'borsa', tie:'cravatta', suitcase:'valigia', frisbee:'frisbee',
  skis:'sci', snowboard:'snowboard', 'sports ball':'pallone', kite:'aquilone',
  'baseball bat':'mazza', 'baseball glove':'guanto', skateboard:'skateboard',
  surfboard:'surf', 'tennis racket':'racchetta', bottle:'bottiglia',
  'wine glass':'calice', cup:'tazza', fork:'forchetta', knife:'coltello',
  spoon:'cucchiaio', bowl:'ciotola', banana:'banana', apple:'mela',
  sandwich:'panino', orange:'arancia', broccoli:'broccoli', carrot:'carota',
  'hot dog':'hot dog', pizza:'pizza', donut:'ciambella', cake:'torta',
  chair:'sedia', couch:'divano', 'potted plant':'pianta', bed:'letto',
  'dining table':'tavolo', toilet:'bagno', tv:'televisore', laptop:'laptop',
  mouse:'mouse', remote:'telecomando', keyboard:'tastiera',
  'cell phone':'cellulare', microwave:'microonde', oven:'forno',
  toaster:'tostapane', sink:'lavandino', refrigerator:'frigorifero',
  book:'libro', clock:'orologio', vase:'vaso', scissors:'forbici',
  'teddy bear':'peluche', 'hair drier':'asciugacapelli', toothbrush:'spazzolino'
};
const it = s => IT[s] || s;

// Deterministic hue per class
function hue(cls) {
  let h = 0;
  for (let i = 0; i < cls.length; i++) h = (h * 31 + cls.charCodeAt(i)) >>> 0;
  return h % 360;
}
const col = (cls, a = 1) => `hsla(${hue(cls)},100%,60%,${a})`;

// ── Load model ────────────────────────────────────────────────────────────────
async function loadModel() {
  ovTitle.textContent = 'DOWNLOAD MODELLO';
  ovSub.textContent   = 'YOLOv8n quantizzato (q8 · ~6 MB)…';
  sBackend.textContent = '…';

  // Detect WebGPU support
  let device = 'wasm';
  try {
    const adapter = await navigator.gpu?.requestAdapter();
    if (adapter) device = 'webgpu';
  } catch (_) {}

  sBackend.textContent = device.toUpperCase();

  detector = await pipeline(
    'object-detection',
    'Xenova/yolov8n',
    {
      device,
      dtype: device === 'webgpu' ? 'fp16' : 'q8',  // fp16 on GPU, q8 on CPU
    }
  );
  ovSub.textContent = 'Modello pronto ✓';
}

// ── Start ─────────────────────────────────────────────────────────────────────
btnStart.addEventListener('click', async () => {
  btnStart.disabled = true;
  ov.classList.remove('gone');
  ovTitle.textContent = 'AVVIO';
  ovSub.textContent   = 'Caricamento modello e fotocamera…';

  try {
    if (!detector) await loadModel();

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    video.srcObject = stream;
    await video.play();

    overlay.width  = video.videoWidth  || 640;
    overlay.height = video.videoHeight || 480;
    video.addEventListener('loadedmetadata', () => {
      overlay.width  = video.videoWidth;
      overlay.height = video.videoHeight;
    });

    ov.classList.add('gone');
    btnStart.style.display = 'none';
    btnPause.style.display = '';
    btnStop.style.display  = '';
    sStatus.textContent    = 'LIVE';
    sStatus.style.color    = 'var(--g)';

    running = true;
    loop();
  } catch(e) {
    ovTitle.textContent = 'ERRORE';
    ovSub.textContent   = e.message || 'Controlla i permessi fotocamera';
    btnStart.disabled   = false;
  }
});

// ── Pause / Resume ────────────────────────────────────────────────────────────
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? '▶ Riprendi' : '⏸ Pausa';
  sStatus.textContent  = paused ? 'PAUSA' : 'LIVE';
  sStatus.style.color  = paused ? 'var(--yel)' : 'var(--g)';
  if (!paused) loop();
});

// ── Stop ──────────────────────────────────────────────────────────────────────
btnStop.addEventListener('click', () => {
  running = false; paused = false; lastTime = 0;
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  ov.classList.remove('gone');
  ovTitle.textContent = 'INIZIALIZZAZIONE';
  ovSub.textContent   = 'Premi AVVIA per cominciare';

  btnStart.style.display = '';
  btnStart.disabled      = false;
  btnPause.style.display = 'none';
  btnStop.style.display  = 'none';
  btnPause.textContent   = '⏸ Pausa';

  sStatus.textContent = 'OFFLINE';
  sStatus.style.color = '';
  sObjs.textContent   = '—';
  sFps.textContent    = '—';
  fpsBadge.textContent = '-- FPS';
  chipsEl.innerHTML   = '<div class="no-obj">Nessun oggetto rilevato</div>';
});

// ── Detection loop ────────────────────────────────────────────────────────────
// We run inference then schedule next frame after it completes — never queues.
async function loop() {
  if (!running || paused) return;
  if (video.readyState < 2) { requestAnimationFrame(loop); return; }

  // FPS
  const now = performance.now();
  if (lastTime) fps = fps * 0.88 + (1000 / (now - lastTime)) * 0.12;
  lastTime = now;
  const fpsStr = fps.toFixed(1);
  fpsBadge.textContent = fpsStr + ' FPS';
  sFps.textContent     = fpsStr;

  // Sync canvas size
  if (video.videoWidth && overlay.width !== video.videoWidth) {
    overlay.width  = video.videoWidth;
    overlay.height = video.videoHeight;
  }

  try {
    // Capture frame → RawImage
    const offscreen = new OffscreenCanvas(video.videoWidth || 640, video.videoHeight || 480);
    offscreen.getContext('2d').drawImage(video, 0, 0);
    const blob = await offscreen.convertToBlob({ type: 'image/jpeg', quality: 0.85 });
    const url  = URL.createObjectURL(blob);

    const results = await detector(url, { threshold: CONF });
    URL.revokeObjectURL(url);

    draw(results);
    chips(results);
    sObjs.textContent = results.length;
  } catch(_) { /* skip frame on error */ }

  // Schedule next iteration after inference completes (no stacking)
  requestAnimationFrame(loop);
}

// ── Draw bounding boxes ───────────────────────────────────────────────────────
function draw(preds) {
  const W = overlay.width, H = overlay.height;
  ctx.clearRect(0, 0, W, H);

  for (const p of preds) {
    const { xmin, ymin, xmax, ymax } = p.box;
    const w = xmax - xmin, h = ymax - ymin;
    const label = it(p.label).toUpperCase();
    const conf  = (p.score * 100).toFixed(0) + '%';
    const c     = col(p.label);

    // Semi-transparent fill
    ctx.fillStyle = col(p.label, 0.07);
    ctx.fillRect(xmin, ymin, w, h);

    // Border with glow
    ctx.strokeStyle = c;
    ctx.lineWidth   = 2;
    ctx.shadowColor = c;
    ctx.shadowBlur  = 10;
    ctx.strokeRect(xmin, ymin, w, h);
    ctx.shadowBlur  = 0;

    // Corner brackets
    const s = Math.min(14, w * .18, h * .18);
    ctx.lineWidth = 3;
    [
      [xmin,  ymin,  1,  1],
      [xmax,  ymin, -1,  1],
      [xmin,  ymax,  1, -1],
      [xmax,  ymax, -1, -1]
    ].forEach(([cx, cy, dx, dy]) => {
      ctx.beginPath();
      ctx.moveTo(cx + dx * s, cy);
      ctx.lineTo(cx, cy);
      ctx.lineTo(cx, cy + dy * s);
      ctx.strokeStyle = c;
      ctx.shadowColor = c;
      ctx.shadowBlur  = 14;
      ctx.stroke();
    });
    ctx.shadowBlur = 0;

    // Label pill
    const fs = Math.max(10, Math.min(13, W / 44));
    ctx.font = `bold ${fs}px 'Share Tech Mono', monospace`;
    const txt = `${label} ${conf}`;
    const tw  = ctx.measureText(txt).width;
    const th  = fs + 8;
    const lx  = Math.min(xmin, W - tw - 14);
    const ly  = ymin > th + 4 ? ymin - th - 2 : ymin + 2;

    ctx.fillStyle = col(p.label, .92);
    ctx.fillRect(lx, ly, tw + 12, th);
    ctx.fillStyle = '#04080b';
    ctx.fillText(txt, lx + 6, ly + fs + 2);
  }
}

// ── Chips panel ───────────────────────────────────────────────────────────────
function chips(preds) {
  if (!preds.length) {
    chipsEl.innerHTML = '<div class="no-obj">Nessun oggetto rilevato</div>';
    return;
  }
  // Merge duplicates
  const map = {};
  preds.forEach(p => { if (!map[p.label] || p.score > map[p.label]) map[p.label] = p.score; });

  chipsEl.innerHTML = Object.entries(map)
    .sort((a, b) => b[1] - a[1])
    .map(([cls, sc], i) => {
      const hi  = sc >= 0.6;
      const pct = (sc * 100).toFixed(0);
      const dot = `<span style="width:7px;height:7px;border-radius:50%;background:${col(cls)};flex-shrink:0;display:inline-block"></span>`;
      return `<div class="chip${hi?' hi':''}" style="animation-delay:${i*40}ms">
        ${dot}<span>${it(cls)}</span><span class="chip-sc">${pct}%</span>
      </div>`;
    }).join('');
}

// ── Pre-load model in background ─────────────────────────────────────────────
loadModel().catch(e => {
  ovTitle.textContent = 'ERRORE MODELLO';
  ovSub.textContent   = e.message;
  ovProg.style.display = 'none';
});
</script>
</body>
</html>
