<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VisionScan RT — Real-Time Object Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g:    #00ff88;
      --gdim: #a8f0c6;
      --gdk:  #0a2e1e;
      --gmd:  #155a38;
      --bg:   #04080b;
      --red:  #ff3355;
      --yel:  #ffcc00;
    }

    html, body { height: 100%; background: var(--bg); overflow-x: hidden; }
    body { font-family: 'Share Tech Mono', monospace; color: var(--gdim); }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 2px,
        rgba(0,255,120,.012) 2px, rgba(0,255,120,.012) 4px);
      pointer-events: none; z-index: 9999;
    }

    .app {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 12px 24px;
    }

    /* Header */
    header {
      width: 100%; max-width: 560px;
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 10px 0 14px;
    }
    .logo-row { display: flex; align-items: center; gap: 11px; }
    .logo-ring {
      width: 28px; height: 28px;
      border: 2px solid var(--g); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,255,136,.5); }
      50%      { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
    }
    .logo-dot { width: 8px; height: 8px; background: var(--g); border-radius: 50%; }
    h1 {
      font-family: 'Exo 2', sans-serif; font-weight: 800;
      font-size: 1.3rem; letter-spacing: .18em; color: #fff; text-transform: uppercase;
    }
    .sub { font-size: .55rem; color: var(--gmd); letter-spacing: .28em; text-transform: uppercase; }

    /* Stats bar */
    .stats {
      width: 100%; max-width: 560px;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      border: 1px solid var(--gdk); border-bottom: none;
      background: rgba(0,255,136,.015);
    }
    .stat {
      padding: 7px 10px;
      display: flex; flex-direction: column; gap: 2px;
      border-right: 1px solid var(--gdk);
    }
    .stat:last-child { border-right: none; }
    .stat-lbl { font-size: .5rem; color: var(--gmd); letter-spacing: .2em; text-transform: uppercase; }
    .stat-val { font-size: .85rem; color: var(--g); }
    #statObjs { color: var(--yel); }

    /* Camera */
    .cam-wrap {
      width: 100%; max-width: 560px;
      position: relative; background: #000;
      border: 1px solid var(--gdk); overflow: hidden;
    }

    video {
      width: 100%; display: block;
      aspect-ratio: 4/3; object-fit: cover;
    }

    #overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
    }

    .c { position: absolute; width: 20px; height: 20px; z-index: 8; }
    .c-tl { top:6px; left:6px;  border-top:2px solid var(--g); border-left:2px solid var(--g); }
    .c-tr { top:6px; right:6px; border-top:2px solid var(--g); border-right:2px solid var(--g); }
    .c-bl { bottom:6px; left:6px;  border-bottom:2px solid var(--g); border-left:2px solid var(--g); }
    .c-br { bottom:6px; right:6px; border-bottom:2px solid var(--g); border-right:2px solid var(--g); }

    .fps-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: .6rem; color: var(--g);
      background: rgba(0,0,0,.75); border: 1px solid var(--gdk);
      padding: 3px 8px; z-index: 9; letter-spacing: .1em;
    }

    .loading-ov {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: rgba(4,8,11,.92); z-index: 20;
    }
    .loading-ov.hidden { display: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 2px solid var(--gdk); border-top-color: var(--g);
      border-radius: 50%; animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-txt  { font-size: .72rem; color: var(--g); letter-spacing: .18em; }
    .load-sub  { font-size: .58rem; color: var(--gmd); letter-spacing: .1em; text-align: center; padding: 0 20px; }
    .prog-bar  { width: 160px; height: 2px; background: var(--gdk); overflow: hidden; }
    .prog-fill {
      height: 100%; background: var(--g); width: 30%;
      animation: prog 1.4s ease-in-out infinite;
    }
    @keyframes prog {
      0%   { margin-left: 0%;   width: 30%; }
      50%  { margin-left: 40%;  width: 40%; }
      100% { margin-left: 100%; width: 0%;  }
    }

    /* Controls */
    .controls {
      width: 100%; max-width: 560px;
      display: flex; gap: 10px; padding: 12px 0;
    }
    .btn {
      flex: 1; padding: 12px 8px;
      border: 1px solid var(--gdk); background: transparent;
      color: var(--gdim); font-family: 'Share Tech Mono', monospace;
      font-size: .7rem; letter-spacing: .15em; text-transform: uppercase;
      cursor: pointer; transition: all .15s;
    }
    .btn:hover:not(:disabled) { border-color: var(--g); color: var(--g); background: rgba(0,255,136,.05); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn-primary { border-color: var(--g); background: var(--g); color: var(--bg); font-weight: 700; }
    .btn-primary:hover:not(:disabled) { background: #33ffaa; border-color: #33ffaa; }
    .btn-red:hover:not(:disabled) { border-color: var(--red); color: var(--red); background: rgba(255,51,85,.05); }

    /* Detected panel */
    .panel {
      width: 100%; max-width: 560px;
      border: 1px solid var(--gdk); border-top: none;
      background: rgba(0,255,136,.015);
      padding: 12px 14px;
    }
    .panel-hdr {
      font-size: .55rem; color: var(--gmd); letter-spacing: .25em;
      text-transform: uppercase; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-hdr::after { content:''; flex:1; height:1px; background: var(--gdk); }

    .obj-list { display: flex; flex-wrap: wrap; gap: 7px; min-height: 38px; }

    .obj-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      border: 1px solid var(--gdk); font-size: .7rem; color: var(--gdim);
    }
    .obj-chip.hi { border-color: var(--g); color: var(--g); }
    .chip-conf { font-size: .58rem; }
    .obj-chip.hi .chip-conf { color: var(--g); }
    .obj-chip:not(.hi) .chip-conf { color: var(--gmd); }

    .no-obj { font-size: .67rem; color: var(--gmd); letter-spacing: .1em; align-self: center; }

    .model-info {
      width: 100%; max-width: 560px;
      font-size: .52rem; color: var(--gdk);
      letter-spacing: .12em; text-align: center;
      padding: 12px 0 4px;
    }

    @keyframes tag-in {
      from { opacity:0; transform:translateY(4px); }
      to   { opacity:1; transform:none; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-row">
      <div class="logo-ring"><div class="logo-dot"></div></div>
      <h1>VisionScan RT</h1>
    </div>
    <div class="sub">Real-Time · On-Device · No Cloud · COCO-SSD</div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">Stato</div>
      <div class="stat-val" id="statStatus">OFFLINE</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Oggetti</div>
      <div class="stat-val" id="statObjs">—</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Modello</div>
      <div class="stat-val" id="statModel">—</div>
    </div>
  </div>

  <div class="cam-wrap">
    <div class="c c-tl"></div><div class="c c-tr"></div>
    <div class="c c-bl"></div><div class="c c-br"></div>
    <div class="fps-badge" id="fpsBadge">-- FPS</div>

    <div class="loading-ov" id="loadingOv">
      <div class="spinner"></div>
      <div class="load-txt" id="loadTxt">INIZIALIZZAZIONE</div>
      <div class="prog-bar"><div class="prog-fill"></div></div>
      <div class="load-sub" id="loadSub">Premi AVVIA per cominciare</div>
    </div>

    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="btnStart">▶ Avvia</button>
    <button class="btn" id="btnPause" style="display:none">⏸ Pausa</button>
    <button class="btn btn-red" id="btnStop" style="display:none">■ Stop</button>
  </div>

  <div class="panel">
    <div class="panel-hdr">Oggetti rilevati</div>
    <div class="obj-list" id="objList">
      <div class="no-obj">Nessun oggetto rilevato</div>
    </div>
  </div>

  <div class="model-info">COCO-SSD · MobileNetV2 · 80 classi · Accelerazione WebGL</div>
</div>

<script>
(async () => {
  const video      = document.getElementById('video');
  const overlay    = document.getElementById('overlay');
  const ctx2d      = overlay.getContext('2d');
  const btnStart   = document.getElementById('btnStart');
  const btnPause   = document.getElementById('btnPause');
  const btnStop    = document.getElementById('btnStop');
  const loadingOv  = document.getElementById('loadingOv');
  const loadTxt    = document.getElementById('loadTxt');
  const loadSub    = document.getElementById('loadSub');
  const fpsBadge   = document.getElementById('fpsBadge');
  const statStatus = document.getElementById('statStatus');
  const statObjs   = document.getElementById('statObjs');
  const statModel  = document.getElementById('statModel');
  const objList    = document.getElementById('objList');

  let model = null, stream = null, rafId = null;
  let paused = false, lastTime = 0, fps = 0;

  // Italian labels
  const IT = {
    person:'persona', bicycle:'bicicletta', car:'automobile', motorcycle:'moto',
    airplane:'aereo', bus:'autobus', train:'treno', truck:'camion', boat:'barca',
    'traffic light':'semaforo', 'fire hydrant':'idrante', 'stop sign':'stop',
    'parking meter':'parchimetro', bench:'panchina', bird:'uccello', cat:'gatto',
    dog:'cane', horse:'cavallo', sheep:'pecora', cow:'mucca', elephant:'elefante',
    bear:'orso', zebra:'zebra', giraffe:'giraffa', backpack:'zaino', umbrella:'ombrello',
    handbag:'borsa', tie:'cravatta', suitcase:'valigia', frisbee:'frisbee',
    skis:'sci', snowboard:'snowboard', 'sports ball':'pallone', kite:'aquilone',
    'baseball bat':'mazza', 'baseball glove':'guanto', skateboard:'skateboard',
    surfboard:'surf', 'tennis racket':'racchetta', bottle:'bottiglia',
    'wine glass':'calice', cup:'tazza', fork:'forchetta', knife:'coltello',
    spoon:'cucchiaio', bowl:'ciotola', banana:'banana', apple:'mela',
    sandwich:'panino', orange:'arancia', broccoli:'broccoli', carrot:'carota',
    'hot dog':'hot dog', pizza:'pizza', donut:'ciambella', cake:'torta',
    chair:'sedia', couch:'divano', 'potted plant':'pianta', bed:'letto',
    'dining table':'tavolo', toilet:'bagno', tv:'televisore', laptop:'laptop',
    mouse:'mouse', remote:'telecomando', keyboard:'tastiera',
    'cell phone':'cellulare', microwave:'microonde', oven:'forno',
    toaster:'tostapane', sink:'lavandino', refrigerator:'frigorifero',
    book:'libro', clock:'orologio', vase:'vaso', scissors:'forbici',
    'teddy bear':'peluche', 'hair drier':'asciugacapelli', toothbrush:'spazzolino'
  };
  const it = cls => IT[cls] || cls;

  // Deterministic hue per class
  function hue(cls) {
    let h = 0;
    for (let i = 0; i < cls.length; i++) h = (h * 31 + cls.charCodeAt(i)) >>> 0;
    return h % 360;
  }
  function col(cls, a = 1) { return `hsla(${hue(cls)},100%,62%,${a})`; }

  // ── Load model (preload in background) ──
  async function loadModel() {
    statModel.textContent = 'CARICO';
    try {
      model = await cocoSsd.load({ base: 'mobilenet_v2' });
      statModel.textContent = 'SSD-V2';
    } catch(e) {
      statModel.textContent = 'ERR';
      loadTxt.textContent = 'ERRORE MODELLO';
      loadSub.textContent = 'Ricarica la pagina e riprova';
      throw e;
    }
  }

  // Pre-load immediately
  loadModel().catch(() => {});

  // ── Start ──
  btnStart.addEventListener('click', async () => {
    btnStart.disabled = true;
    loadTxt.textContent = 'CARICAMENTO';
    loadSub.textContent = 'Download modello e accesso fotocamera...';
    loadingOv.classList.remove('hidden');

    try {
      if (!model) await loadModel();

      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } }
      });
      video.srcObject = stream;
      await video.play();

      // Sync canvas to actual video resolution
      const syncSize = () => {
        overlay.width  = video.videoWidth  || 640;
        overlay.height = video.videoHeight || 480;
      };
      video.addEventListener('loadedmetadata', syncSize);
      syncSize();

      loadingOv.classList.add('hidden');
      btnStart.style.display = 'none';
      btnPause.style.display = '';
      btnStop.style.display  = '';
      statStatus.textContent = 'LIVE';
      statStatus.style.color = 'var(--g)';

      loop();
    } catch(e) {
      loadTxt.textContent = 'ERRORE';
      loadSub.textContent = e.message || 'Controlla i permessi fotocamera';
      btnStart.disabled = false;
    }
  });

  // ── Pause ──
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent = paused ? '▶ Riprendi' : '⏸ Pausa';
    statStatus.textContent = paused ? 'PAUSA' : 'LIVE';
    statStatus.style.color = paused ? 'var(--yel)' : 'var(--g)';
    if (!paused) loop();
  });

  // ── Stop ──
  btnStop.addEventListener('click', () => {
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null; rafId = null; paused = false; lastTime = 0;

    ctx2d.clearRect(0, 0, overlay.width, overlay.height);
    loadingOv.classList.remove('hidden');
    loadTxt.textContent = 'INIZIALIZZAZIONE';
    loadSub.textContent = 'Premi AVVIA per cominciare';

    btnStart.style.display = '';
    btnStart.disabled = false;
    btnPause.style.display = 'none';
    btnStop.style.display  = 'none';
    btnPause.textContent = '⏸ Pausa';

    statStatus.textContent = 'OFFLINE';
    statStatus.style.color = '';
    statObjs.textContent = '—';
    fpsBadge.textContent = '-- FPS';
    objList.innerHTML = '<div class="no-obj">Nessun oggetto rilevato</div>';
  });

  // ── Detection loop ──
  async function loop() {
    if (paused || !stream) return;

    if (video.readyState >= 2 && model) {
      // FPS (EMA)
      const now = performance.now();
      if (lastTime) fps = fps * 0.88 + (1000 / (now - lastTime)) * 0.12;
      lastTime = now;
      fpsBadge.textContent = fps.toFixed(1) + ' FPS';

      // Sync canvas size if stream resolution changed
      if (overlay.width !== video.videoWidth && video.videoWidth > 0) {
        overlay.width  = video.videoWidth;
        overlay.height = video.videoHeight;
      }

      try {
        const preds = await model.detect(video);
        draw(preds);
        chips(preds);
        statObjs.textContent = preds.length;
      } catch (_) { /* skip frame */ }
    }

    rafId = requestAnimationFrame(loop);
  }

  // ── Draw boxes ──
  function draw(preds) {
    const W = overlay.width, H = overlay.height;
    ctx2d.clearRect(0, 0, W, H);

    preds.forEach(p => {
      const [x, y, w, h] = p.bbox;
      const label = it(p.class).toUpperCase();
      const conf  = (p.score * 100).toFixed(0) + '%';
      const c     = col(p.class);
      const cHalf = col(p.class, .45);

      // Fill
      ctx2d.fillStyle = cHalf.replace('.45', '.08');
      ctx2d.fillRect(x, y, w, h);

      // Border
      ctx2d.strokeStyle = c;
      ctx2d.lineWidth = 2;
      ctx2d.shadowColor = c;
      ctx2d.shadowBlur = 10;
      ctx2d.strokeRect(x, y, w, h);
      ctx2d.shadowBlur = 0;

      // Corner brackets
      const s = Math.min(16, w * .2, h * .2);
      ctx2d.lineWidth = 3;
      ctx2d.shadowBlur = 14;
      [
        [x,   y,    1,  1],
        [x+w, y,   -1,  1],
        [x,   y+h,  1, -1],
        [x+w, y+h, -1, -1]
      ].forEach(([cx, cy, dx, dy]) => {
        ctx2d.beginPath();
        ctx2d.moveTo(cx + dx*s, cy);
        ctx2d.lineTo(cx, cy);
        ctx2d.lineTo(cx, cy + dy*s);
        ctx2d.strokeStyle = c;
        ctx2d.shadowColor = c;
        ctx2d.stroke();
      });
      ctx2d.shadowBlur = 0;

      // Label
      const fs = Math.max(10, Math.min(13, W / 44));
      ctx2d.font = `bold ${fs}px 'Share Tech Mono', monospace`;
      const txt = `${label} ${conf}`;
      const tw  = ctx2d.measureText(txt).width;
      const th  = fs + 8;
      const lx  = Math.min(x, W - tw - 14);
      const ly  = y > th + 4 ? y - th - 3 : y + 3;

      ctx2d.fillStyle = col(p.class, .92);
      ctx2d.fillRect(lx, ly, tw + 12, th);

      ctx2d.fillStyle = '#04080b';
      ctx2d.shadowBlur = 0;
      ctx2d.fillText(txt, lx + 6, ly + fs + 2);
    });
  }

  // ── Chips ──
  function chips(preds) {
    if (!preds.length) {
      objList.innerHTML = '<div class="no-obj">Nessun oggetto rilevato</div>';
      return;
    }
    // Merge duplicates, keep max score
    const map = {};
    preds.forEach(p => { if (!map[p.class] || p.score > map[p.class]) map[p.class] = p.score; });

    objList.innerHTML = Object.entries(map)
      .sort((a, b) => b[1] - a[1])
      .map(([cls, sc], i) => {
        const hi   = sc >= 0.6;
        const pct  = (sc * 100).toFixed(0);
        const dot  = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${col(cls)};flex-shrink:0"></span>`;
        return `<div class="obj-chip${hi?' hi':''}" style="animation:tag-in .3s ${i*45}ms both">
          ${dot}
          <span>${it(cls)}</span>
          <span class="chip-conf">${pct}%</span>
        </div>`;
      }).join('');
  }
})();
</script>
</body>
</html>
